<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>KanBoost!</title>
</head>

<body class="bg-[#DEDEDE]">


    <div class=" fixed  h-26 w-full shadow-xl bg-[#DEDEDE]">
        <img src="img/Untitled (500 x 500 px).png" class="fixed mt-[-200px]">
    </div>

    <a href="home.html">
        <button
            class="fixed  ml-420 h-20 mt-4 text-[#333] font-bold  shadow-lg w-50 rounded-full hover:bg-blue-300 cursor-pointer bg-blue-200">Voltar
            para a tela inicial</button>
    </a>
    <div class="h-26 w-full"></div>

    <div class="a justify-center align-middle text-center flex">
        <h2 id="msg" class=" fixed  mt-10  text-[30px] font-bold text-red-700 "></h2>
    </div>
    <div class="h text-center justify-center mt-40">
        <h1 class="font-bold text-[40px] text-[#333] ">Cadastre uma nova atividade!</h1>
    </div>

    <div class="flex justify-center align-middle items-center m-auto">
        <div class="cont bg-[#AED6F1] shadow-xl rounded-lg h-100 justify-center items-center flex  w-300 mt-10 ">
            <input id="input"
                class="bg-white w-230 h-40 rounded-xl shadow-xl text-center justify-center text-black text-[30px]"
                placeholder="Insira aqui" type="text">
        </div>

    </div>

    <div id="button" class="b flex justify-center items-center ">
        <button
            class="bg-[#A2DED0] shadow-xl border-white border-2 cursor-pointer hover:bg-green-100 h-30 w-80 text-[40px] rounded-xl mt-[-40px]">Cadastrar</button>
    </div>

    <script src="js/ca.js"></script>

</body>

</html>
