<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>KanBoost!</title>
</head>

<body class="bg-[#DEDEDE]">

    <div class=" fixed  h-26 w-full shadow-xl bg-[#DEDEDE]">
        <img src="img/Untitled (500 x 500 px).png" class="fixed mt-[-200px]">
    </div>

    <a href="home.html">
        <button
            class="fixed  ml-420 h-20 mt-4 text-[#333] font-bold  shadow-lg w-50 rounded-full hover:bg-blue-300 cursor-pointer bg-blue-200">Voltar
            para a tela inicial</button>
    </a>
    <div class="h-26 w-full"></div>

    <div class="a justify-center align-middle text-center flex">
        <h2 id="msg" class=" h-[60px] fixed  mt-10 w-[30px] text-[30px] font-bold text-red-300 "></h2>
    </div>

    <div class="containerDiv flex justify-center align-middle items-center">
        <div class="d bg-gray-100 h-170 w-250 flex rounded-xl flex mt-20">
            <div class="aaaaa flex ">
                <div id="todo"
                    class="h-full justify-center  w-85 rounded-xl  shadow-xl border-white border-2 bg-[#AED6F1]">
                    <h1 class="text-center text-[40px] h-20 w-full font-bold text-blue-900 border-2 border-white">To do
                    </h1>
                </div>
            </div>

            <div id="doing" class="h-full w-85 rounded-xl  shadow-xl border-white border-2 bg-[#A2DED0]">
                <h1 class="text-center text-[40px] h-20 w-full font-bold text-green-900 border-2 border-white">Doing
                </h1>
            </div>
            <div id="done" class="h-full w-85 rounded-xl  shadow-xl border-white border-2 bg-gray-300">
                <h1 class="text-center text-[40px] h-20 w-full font-bold text-gray-700 border-2 border-white">Done</h1>
            </div>
        </div>
    </div>

    <script src="js/kb.js"></script>

</body>

</html>
